services:
  backend:
    build:
      context: ./backend
    container_name: project-assignment-backend
    ports:
      - "5001:5000"
    volumes:
      - ./backend/database:/app/database

  frontend:
    build:
      context: ./frontend
    container_name: project-assignment-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend